<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chess Beginner Coach - Puzzle Lessons</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#101820;
    color:white;
    min-height:100vh;
  }
  .app{
    display:grid;
    grid-template-columns:260px 1fr 390px;
    gap:18px;
    padding:18px;
    min-height:100vh;
  }
  .sidebar,.main,.coach{
    background:#1f2d3a;
    border-radius:16px;
    padding:16px;
    box-shadow:0 0 18px rgba(0,0,0,.35);
  }
  h1,h2,h3{margin-top:0}
  .lesson-btn{
    display:block;
    width:100%;
    text-align:left;
    background:#0f1720;
    color:white;
    border:1px solid #31465b;
    border-radius:10px;
    padding:10px;
    margin:8px 0;
    cursor:pointer;
  }
  .lesson-btn.active{background:#2ecc71;color:#08120c;font-weight:bold}
  .lesson-btn.done::after{content:" ✓";float:right;color:#2ecc71}
  .board{
    display:grid;
    grid-template-columns:repeat(8,66px);
    grid-template-rows:repeat(8,66px);
    border:5px solid #111;
    width:max-content;
    margin:14px 0;
  }
  .square{
    width:66px;height:66px;
    display:flex;align-items:center;justify-content:center;
    font-size:39px;
    position:relative;
    cursor:pointer;
    user-select:none;
  }
  .light{background:#f0d9b5}
  .dark{background:#b58863}
  .coord{
    position:absolute;
    left:4px;
    top:3px;
    font-size:11px;
    color:rgba(0,0,0,.55);
    font-weight:bold;
    pointer-events:none;
  }
  .dark .coord{color:rgba(255,255,255,.65)}
  .coach-highlight{
    box-shadow:inset 0 0 0 6px rgba(255,235,59,.95), 0 0 18px rgba(255,235,59,.75);
    z-index:2;
  }
  .coach-highlight::after{
    content:"";
    position:absolute;
    inset:18px;
    border-radius:50%;
    background:rgba(255,235,59,.75);
    pointer-events:none;
  }
  .selected-from{
    box-shadow:inset 0 0 0 5px rgba(52,152,219,.95);
  }
  .correct{box-shadow:inset 0 0 0 5px rgba(46,204,113,.95)}
  .wrong{box-shadow:inset 0 0 0 5px rgba(231,76,60,.95)}
  .white-piece{color:#fff8dc;text-shadow:2px 2px 4px #000;z-index:3}
  .black-piece{color:#111;text-shadow:1px 1px 3px #fff;z-index:3}
  .card{
    background:#0f1720;
    padding:14px;
    border-radius:12px;
    margin:12px 0;
    line-height:1.45;
  }
  .scorebox{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin:10px 0;
  }
  .score-pill{
    background:#0f1720;
    border:1px solid #31465b;
    border-radius:999px;
    padding:8px 12px;
    font-weight:bold;
  }
  .congrats{
    display:none;
    background:linear-gradient(135deg,#2ecc71,#f1c40f);
    color:#06120a;
    padding:16px;
    border-radius:16px;
    margin:14px 0;
    box-shadow:0 0 22px rgba(46,204,113,.45);
    font-weight:bold;
  }
  .congrats.show{display:block}
  .next-arrow{
    background:#101820;
    color:white;
    font-size:18px;
    padding:12px 16px;
    margin-top:10px;
  }
  .chatlog{
    background:#0f1720;
    height:315px;
    overflow-y:auto;
    padding:12px;
    border-radius:12px;
    font-size:14px;
    line-height:1.4;
  }
  .msg{margin-bottom:12px}
  .you{color:#86efac}
  .bot{color:#7dd3fc}
  input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:0;
    margin-top:10px;
    font-size:15px;
  }
  button{
    padding:10px 12px;
    border:0;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    margin:6px 4px 0 0;
  }
  .ask{background:#2ecc71}
  .small{background:#34495e;color:white}
  .suggestions button{
    background:#22364a;
    color:white;
    font-size:13px;
    margin:5px 4px 0 0;
  }
  .feedback{
    font-weight:bold;
    min-height:24px;
    margin-top:10px;
  }
  @media(max-width:1130px){
    .app{grid-template-columns:1fr}
    .board{grid-template-columns:repeat(8,44px);grid-template-rows:repeat(8,44px)}
    .square{width:44px;height:44px;font-size:28px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <h2>Lessons</h2>
    <div id="lessonList"></div>
  </div>

  <div class="main">
    <h1 id="lessonTitle">Chess Coach</h1>
    <div id="lessonText" class="card"></div>
    <h3>Practice Puzzle</h3>
    <div id="scenarioText" class="card"></div>
    <div id="board" class="board"></div>
    <div class="scorebox">
      <div class="score-pill" id="scoreDisplay">Score: 0</div>
      <div class="score-pill" id="lessonPointsDisplay">This lesson: 0</div>
    </div>
    <div id="feedback" class="feedback"></div>
    <div id="congratsBox" class="congrats">
      🎉 Congratulations! You completed this lesson.
      <div id="pointsEarnedText"></div>
      <button class="next-arrow" onclick="moveToNextLesson()">Move on ➜</button>
    </div>
    <button class="small" onclick="showHint()">💡 Hint</button>
    <button class="small" onclick="explainAgain()">🧠 Explain Again</button>
    <button class="small" onclick="clearCoachHighlights()">🧽 Clear Highlights</button>
    <button class="small" onclick="resetScenario()">↻ Reset Try</button>
  </div>

  <div class="coach">
    <h2>💬 Interactive Coach</h2>
    <div id="chatlog" class="chatlog"></div>
    <input id="questionInput" placeholder="Try: Which square is e4? Show me the center. What is protected?" />
    <button class="ask" onclick="askQuestion()">Ask</button>
    <h3>Recommended Questions</h3>
    <div id="suggestions" class="suggestions"></div>
  </div>
</div>

const glossary = {
  "diagonal":"Diagonal means a slanted line across squares of the same color, like a bishop moves.",
  "diagonally":"Diagonally means moving along a diagonal, not straight up, down, left, or right.",
  "forward":"Forward means toward the opponent's side. White moves toward rank 8. Black moves toward rank 1.",
  "file":"A file is a vertical column, labeled a through h.",
  "rank":"A rank is a horizontal row, numbered 1 through 8.",
  "center":"The center is e4, d4, e5, and d5.",
  "pawn":"A pawn moves forward and captures diagonally.",
  "rook":"A rook moves straight up, down, left, or right.",
  "bishop":"A bishop moves diagonally.",
  "knight":"A knight moves in an L shape and can jump.",
  "queen":"A queen moves straight or diagonally.",
  "king":"The king moves one square and cannot move into check.",
  "capture":"Capture means taking an opponent's piece by moving onto its square.",
  "material":"Material means the value of pieces.",
  "check":"Check means the king is under attack.",
  "checkmate":"Checkmate means the king is in check and cannot escape.",
  "opening":"The opening is the start of the game.",
  "develop":"Develop means move a piece to a useful square.",
  "fork":"A fork attacks two or more pieces at once.",
  "pin":"A pin is when a piece should not move because something valuable behind it would be exposed.",
  "protected":"Protected means defended by another piece. If that piece is captured, your other piece can capture back.",
  "defended":"Defended means protected by another piece.",
  "forcing":"Forcing means your opponent must respond, usually because of check, a capture, or a serious threat.",
  "best move":"The best move is the strongest move in the position."
};

let currentLesson = 0;
let coachHighlights = [];
let totalScore = 0;
let lessonAttempts = 0;
let lessonCompleted = false;
let completedLessons = {};

function init(){
  renderLessonButtons();
  loadLesson(0);
}

function renderLessonButtons(){
  const list = document.getElementById("lessonList");
  list.innerHTML = "";
  lessons.forEach((lesson,i)=>{
    const btn = document.createElement("button");
    btn.className = "lesson-btn" + (i===currentLesson?" active":"") + (completedLessons[i] ? " done" : "");
    btn.textContent = (i+1)+". "+lesson.title;
    btn.onclick = ()=>loadLesson(i);
    list.appendChild(btn);
  });
}

function loadLesson(i){
  currentLesson = i;
  coachHighlights = [];
  lessonAttempts = 0;
  lessonCompleted = !!completedLessons[i];
  renderLessonButtons();
  const lesson = lessons[i];
  document.getElementById("lessonTitle").textContent = lesson.title;
  document.getElementById("lessonText").textContent = lesson.text;
  document.getElementById("scenarioText").textContent = lesson.scenario;
  document.getElementById("feedback").textContent = "";
  updateScoreDisplay();
  hideCongrats();
  renderBoard();
  renderSuggestions();
  document.getElementById("chatlog").innerHTML = "";
  addBot("Welcome to " + lesson.title + ". I will not show the answer choices on the board. You choose the best destination square.");
}

function renderBoard(){
  const board = document.getElementById("board");
  const lesson = lessons[currentLesson];
  board.innerHTML = "";
  for(let row=0; row<8; row++){
    for(let col=0; col<8; col++){
      const file = String.fromCharCode(97+col);
      const rank = 8-row;
      const sq = file+rank;
      const div = document.createElement("div");
      div.className = "square " + ((row+col)%2===0 ? "light":"dark");
      div.dataset.square = sq;

      const coord = document.createElement("span");
      coord.className = "coord";
      coord.textContent = sq;
      div.appendChild(coord);

      if(coachHighlights.includes(sq)) div.classList.add("coach-highlight");
      if(lesson.from === sq) div.classList.add("selected-from");

      const piece = lesson.pieces[sq];
      if(piece){
        const p = document.createElement("span");
        p.textContent = symbols[piece];
        p.className = piece[0]==="w" ? "white-piece":"black-piece";
        div.appendChild(p);
      }

      div.onclick = ()=>handleSquareClick(sq, div);
      board.appendChild(div);
    }
  }
}

function handleSquareClick(square, div){
  if(lessonCompleted) {
    addBot("You already completed this lesson. Click Move on ➜ to continue.");
    return;
  }

  const lesson = lessons[currentLesson];

  if(lesson.from && square === lesson.from){
    addBot("That is the piece you are moving. Now click the destination square.");
    return;
  }

  if(!lesson.legal.includes(square)){
    lessonAttempts++;
    div.classList.add("wrong");
    document.getElementById("feedback").textContent = "That move is not legal from this position. Try again. " + lesson.hint;
    addBot("That destination is not a legal move from the current position. " + lesson.hint);
    updateScoreDisplay();
    return;
  }

  lessonAttempts++;
  document.querySelectorAll(".square").forEach(s=>s.classList.remove("correct","wrong"));

  if(lesson.correct.includes(square)){
    div.classList.add("correct");

    const points = getPointsForAttempts(lessonAttempts);
    totalScore += points;
    completedLessons[currentLesson] = points;
    lessonCompleted = true;

    document.getElementById("feedback").textContent = "Correct! " + lesson.explain;
    addBot("Correct! " + lesson.explain);
    showCongrats(points);
    updateScoreDisplay();
    renderLessonButtons();
  } else if(lesson.ok.includes(square)){
    div.classList.add("wrong");
    document.getElementById("feedback").textContent = "Legal, but not the best. Try again. " + lesson.hint;
    addBot("That move is legal, but not the best answer. " + lesson.hint);
    updateScoreDisplay();
  } else {
    div.classList.add("wrong");
    document.getElementById("feedback").textContent = "Legal, but not the idea here. Try again. " + lesson.hint;
    addBot("That move is legal, but it does not solve the puzzle. " + lesson.hint);
    updateScoreDisplay();
  }
}

function getPointsForAttempts(attempts){
  if(attempts === 1) return 50;
  if(attempts === 2) return 30;
  return 10;
}

function showCongrats(points){
  const box = document.getElementById("congratsBox");
  const text = document.getElementById("pointsEarnedText");
  text.textContent = "You earned " + points + " points for this lesson.";
  box.classList.add("show");
  addBot("🎉 Congratulations! You completed the lesson and earned " + points + " points.");
}

function hideCongrats(){
  document.getElementById("congratsBox").classList.remove("show");
  document.getElementById("pointsEarnedText").textContent = "";
}

function updateScoreDisplay(){
  const possible = lessonAttempts === 0 ? 50 : getPointsForAttempts(lessonAttempts + 1);
  document.getElementById("scoreDisplay").textContent = "Score: " + totalScore;
  document.getElementById("lessonPointsDisplay").textContent = lessonCompleted
    ? "This lesson: " + completedLessons[currentLesson]
    : "This lesson: up to " + possible;
}

function moveToNextLesson(){
  if(currentLesson < lessons.length - 1){
    loadLesson(currentLesson + 1);
  } else {
    addBot("🏆 Amazing! You finished all the lessons. Final score: " + totalScore + " points.");
    document.getElementById("pointsEarnedText").textContent = "You finished every lesson! Final score: " + totalScore + " points.";
  }
}

function renderSuggestions(){
  const box = document.getElementById("suggestions");
  box.innerHTML = "";
  const extras = ["Which square is e4?","Show me the center","Show legal moves","What is the best move?"];
  [...lessons[currentLesson].questions, ...extras].forEach(q=>{
    const btn = document.createElement("button");
    btn.textContent = q;
    btn.onclick = ()=>askSpecific(q);
    box.appendChild(btn);
  });
}

function askSpecific(q){
  document.getElementById("questionInput").value = q;
  askQuestion();
}

function askQuestion(){
  const input = document.getElementById("questionInput");
  const q = input.value.trim();
  if(!q) return;
  addYou(q);
  const result = answerQuestion(q);
  if(result.highlights) {
    coachHighlights = result.highlights;
    renderBoard();
  }
  addBot(result.text);
  input.value = "";
}

document.addEventListener("keydown", e=>{
  if(e.key==="Enter" && document.activeElement.id==="questionInput") askQuestion();
});

function answerQuestion(question){
  const q = question.toLowerCase();
  const lesson = lessons[currentLesson];

  const squareMatch = q.match(/\b([a-h][1-8])\b/i);
  if(squareMatch){
    const sq = squareMatch[1].toLowerCase();
    return {
      text: sq + " is highlighted on the board. The letter is the file and the number is the rank.",
      highlights:[sq]
    };
  }

  if(q.includes("center")){
    return { text:"The center squares are e4, d4, e5, and d5. I highlighted them.", highlights:["e4","d4","e5","d5"] };
  }

  if(q.includes("legal") || q.includes("where can") || q.includes("show moves")){
    return { text:"I highlighted the legal destination squares for this puzzle. The best one is still up to you to find.", highlights:lesson.legal };
  }

  if(q.includes("best move") || q.includes("which move") || q.includes("what move")){
    return { text:"I won't give it away immediately, but the goal is: " + lesson.hint, highlights:lesson.from ? [lesson.from] : [] };
  }

  if(q.includes("capture") && (q.includes("both") || q.includes("show"))){
    const caps = lesson.legal.filter(s => lesson.pieces[s] && lesson.pieces[s][0] === "b");
    return { text:"I highlighted the legal captures in this puzzle. Compare the value of the pieces.", highlights:caps };
  }

  if(q.includes("diagonal")){
    return { text:"A diagonal is a slanted line. I highlighted one diagonal.", highlights:["a1","b2","c3","d4","e5","f6","g7","h8"] };
  }

  if(q.includes("file")){
    const file = (q.match(/\b[a-h]\b/) || ["e"])[0];
    const squares = [];
    for(let r=1;r<=8;r++) squares.push(file+r);
    return { text:"A file is a vertical column. I highlighted the " + file + "-file.", highlights:squares };
  }

  if(q.includes("rank")){
    const rank = (q.match(/\b[1-8]\b/) || ["4"])[0];
    const squares = [];
    for(let c=0;c<8;c++) squares.push(String.fromCharCode(97+c)+rank);
    return { text:"A rank is a horizontal row. I highlighted rank " + rank + ".", highlights:squares };
  }

  let matches = [];
  const sortedKeys = Object.keys(glossary).sort((a,b)=>b.length-a.length);
  for(const word of sortedKeys){
    if(q.includes(word)){
      matches.push(glossary[word]);
      if(matches.length >= 3) break;
    }
  }
  if(matches.length) return {text:matches.join(" ")};

  if(q.includes("explain") || q.includes("again")){
    return {text:lesson.text + " In this puzzle: " + lesson.explain};
  }

  return {text:"I can answer lesson questions and interact with the board. Try asking: 'Show legal moves', 'Which square is e4?', 'Show both captures', or 'What does protected mean?'"};
}

function showHint(){
  addBot("Hint: " + lessons[currentLesson].hint);
}
function explainAgain(){
  addBot(lessons[currentLesson].text + " " + lessons[currentLesson].explain);
}
function clearCoachHighlights(){
  coachHighlights = [];
  renderBoard();
}
function resetScenario(){
  if(lessonCompleted){
    addBot("This lesson is already complete. Click Move on ➜ to continue.");
    return;
  }
  document.getElementById("feedback").textContent = "";
  coachHighlights = [];
  renderBoard();
}
function addYou(text){
  const div = document.createElement("div");
  div.className = "msg you";
  div.innerHTML = "<b>You:</b> " + escapeHTML(text);
  document.getElementById("chatlog").appendChild(div);
  scrollChat();
}
function addBot(text){
  const div = document.createElement("div");
  div.className = "msg bot";
  div.innerHTML = "<b>Coach:</b> " + escapeHTML(text);
  document.getElementById("chatlog").appendChild(div);
  scrollChat();
}
function scrollChat(){
  const c = document.getElementById("chatlog");
  c.scrollTop = c.scrollHeight;
}
function escapeHTML(str){
  return str.replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}

init();
</script>

</html>
